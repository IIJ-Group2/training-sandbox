  <h2>店長 サンドさんのご紹介</h2>
  <p>私がサンドボックス喫茶をはじめたきっかけは、学生時代に訪れた小さな喫茶店での一杯のコーヒーでした。静かで落ち着いた空間で飲むコーヒーが、忙しい日々の中で唯一の癒しだったのです。その時の感動を自分でも作り出したいと思い、このお店をオープンしました。</p>
  <p>当店のコーヒーは、厳選した豆を自家焙煎し、一杯ずつ丁寧にドリップしています。香り高いコーヒーと共に、皆様の日常にホッとするひとときをお届けできれば幸いです。どうぞごゆっくりお過ごしください。</p>
