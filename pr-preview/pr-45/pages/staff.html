<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スタッフ紹介 | サンドボックス喫茶</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="site-header">
  <p class="shop-name">☕ サンドボックス喫茶</p>
  <p class="page-name">スタッフ紹介</p>
</header>

<main>
  <p>サンドボックス喫茶で働くスタッフをご紹介します。</p>

  <div class="card-list">
    <div class="staff-card">
      <p class="staff-name">店長 サンドさん</p>
      <p class="staff-role">店長</p>
      <p>この店をはじめました。コーヒーの淹れ方にはちょっとうるさいです。</p>
    <div class="staff-card">
      <p class="staff-name">バリスタ ボッスクさん</p>
      <p class="staff-role">バリスタ</p>
      <p>ラテアートが得意です。今日のおすすめを聞いてみてください。</p>
    </div>
    <div class="staff-card">
      <p class="staff-name">ウェイター カフェさん</p>
      <p class="staff-role">ウェイター</p>
      <p>いつも笑顔でお客様をお迎えします。甘いものが大好きです。</p>
    </div>
    <div class="staff-card">
      <p class="staff-name">ホールスタッフ トレイさん</p>
      <p class="staff-role">ホールスタッフ</p>
      <p>席へのご案内と片づけを担当しています。ゆっくりしていってください。</p>
    </div>
  </div>

  <a class="back-link" href="../index.html">← トップに戻る</a>
</main>
</body>
</html>
