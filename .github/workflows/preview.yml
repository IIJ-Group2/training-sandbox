name: プレビュー作成

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PR プレビューをデプロイ
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
      - name: 日本語でプレビュー URL をコメント
        if: github.event.action != 'closed'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-ja
          message: |
            👀 **プレビューはこちら**: https://iij-group2.github.io/training-sandbox/pr-preview/pr-${{ github.event.number }}/
            反映まで 1〜2 分かかることがあります。開いたら、Issue の「できたかどうかの確認」を自分の目でチェックしてください。
